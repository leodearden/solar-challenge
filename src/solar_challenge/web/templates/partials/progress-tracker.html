<!-- Progress tracker partial for background simulation jobs.
     Uses HTMX SSE extension and Alpine.js for real-time updates. -->
<div
    id="progress-tracker"
    hx-ext="sse"
    sse-connect="/api/jobs/{{ job_id }}/progress"
    x-data="{
        progress: 0,
        step: 'Queued',
        message: 'Waiting to start...',
        status: 'queued',
        elapsed: 0,
        startTime: Date.now(),
        timer: null,
        error: '',
        runId: '',
        init() {
            this.timer = setInterval(() => {
                this.elapsed = Math.floor((Date.now() - this.startTime) / 1000);
            }, 1000);
        },
        destroy() {
            if (this.timer) clearInterval(this.timer);
        },
        formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return m > 0 ? m + 'm ' + s + 's' : s + 's';
        }
    }"
    x-init="init()"
    @destroy="destroy()"
>
    <!-- Progress event listener -->
    <div
        sse-swap="progress"
        hx-swap="none"
        style="display:none;"
        @sse-message.window="
            try {
                const data = JSON.parse($event.detail.data || '{}');
                if (data.progress_pct !== undefined) progress = data.progress_pct;
                if (data.current_step) step = data.current_step;
                if (data.message) message = data.message;
                if (data.status) status = data.status;
            } catch(e) {}
        "
    ></div>

    <!-- Completion event listener -->
    <div
        sse-swap="complete"
        hx-swap="none"
        style="display:none;"
        @sse-message.window="
            try {
                const data = JSON.parse($event.detail.data || '{}');
                status = 'completed';
                progress = 100;
                step = 'Done';
                message = 'Simulation completed successfully';
                if (data.run_id) runId = data.run_id;
                if (timer) clearInterval(timer);
            } catch(e) {}
        "
    ></div>

    <!-- Error event listener -->
    <div
        sse-swap="error"
        hx-swap="none"
        style="display:none;"
        @sse-message.window="
            try {
                const data = JSON.parse($event.detail.data || '{}');
                status = 'failed';
                error = data.message || 'An unexpected error occurred';
                if (timer) clearInterval(timer);
            } catch(e) {}
        "
    ></div>

    <!-- Progress UI -->
    <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-6">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100">
                Simulation Progress
            </h3>
            <span
                class="text-sm font-mono text-slate-500 dark:text-slate-400"
                x-text="formatTime(elapsed)"
            ></span>
        </div>

        <!-- Running state -->
        <template x-if="status !== 'failed'">
            <div>
                <!-- Progress bar -->
                <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-4 mb-3 overflow-hidden">
                    <div
                        class="h-full rounded-full transition-all duration-500 ease-out"
                        :class="status === 'completed' ? 'bg-green-500' : 'bg-primary-500'"
                        :style="'width: ' + Math.min(progress, 100) + '%'"
                    ></div>
                </div>

                <!-- Percentage and step -->
                <div class="flex items-center justify-between text-sm">
                    <span class="text-slate-600 dark:text-slate-300" x-text="step"></span>
                    <span class="font-mono text-slate-500 dark:text-slate-400"
                          x-text="Math.round(progress) + '%'"></span>
                </div>

                <!-- Message -->
                <p class="mt-2 text-sm text-slate-500 dark:text-slate-400" x-text="message"></p>

                <!-- Completed: show results link -->
                <template x-if="status === 'completed'">
                    <div class="mt-4 pt-4 border-t border-slate-200 dark:border-slate-700">
                        <p class="text-green-600 dark:text-green-400 font-medium mb-3">
                            Simulation completed successfully!
                        </p>
                        <a
                            :href="'/results/home/' + runId"
                            class="inline-flex items-center px-4 py-2 rounded-lg bg-primary-500 text-white font-medium hover:bg-primary-600 transition-colors"
                        >
                            View Results
                        </a>
                    </div>
                </template>
            </div>
        </template>

        <!-- Failed state -->
        <template x-if="status === 'failed'">
            <div class="mt-2">
                <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-4">
                    <p class="text-red-700 dark:text-red-400 font-medium mb-1">
                        Simulation Failed
                    </p>
                    <p class="text-red-600 dark:text-red-300 text-sm" x-text="error"></p>
                </div>
            </div>
        </template>
    </div>
</div>
