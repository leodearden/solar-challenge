{% extends "base.html" %}

{% block title %}Server Error{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-20 text-center">
    <h1 class="text-6xl font-bold text-slate-300 dark:text-slate-600 mb-4">500</h1>
    <h2 class="text-xl font-semibold text-slate-700 dark:text-slate-200 mb-2">Internal Server Error</h2>
    <p class="text-slate-500 dark:text-slate-400 mb-6 max-w-md">
        Something went wrong on our end. Please try again later.
    </p>
    <a href="{{ url_for('main.index') }}"
       class="inline-flex items-center px-4 py-2 rounded-lg bg-amber-500 text-white font-medium hover:bg-amber-600 transition-colors">
        Back to Dashboard
    </a>
</div>
{% endblock %}
