# Bristol [FIN] Calibration Scenario
#
# Investor-spreadsheet-aligned scenario for H6 integration gate (task/48 – θ).
# All parameters are set to match the named inputs in:
#   finance/Forecast Model for Community Owned Solar_INVESTOR_PITCH_v3.xlsm
#
# Fleet: 100 identical homes, each 5.5 kWp PV + 5.0 kWh battery (inp_Batt_kWh=5).
# This is the named-input basis for Capital_Stack!B6 = £775,000:
#   100 × (5.5×£1000 + £1000 + 5.0kWh×£250) = 100 × £7,750 = £775,000
#
# Note on the §2.3 capex delta:
#   The Workings sheet uses a 10 kWh basis (Workings!C57 = £9,000/roof;
#   Workings!C94 = £900,000). Delta = £125,000 = 100 × 5kWh × £250
#   — pure battery-size difference, NOT an arithmetic error.
#
# SEG rate: 6.0 p/kWh ([FIN] export price; Sensitivity/own-use rate 15 p/kWh).
# See docs/finance-spreadsheet-reconciliation.md for cell-ref mapping.

name: Bristol FIN Calibration

# Simulation period (1 full year for annual revenue accuracy)
period:
  start_date: "2024-01-01"
  end_date: "2024-12-31"

location:
  latitude: 51.45
  longitude: -2.58
  timezone: Europe/London
  altitude: 11.0
  name: Bristol, UK

# Smart Export Guarantee — [FIN] export rate (export_rate_pence_per_kwh in golden cells)
seg:
  rate_pence_per_kwh: 6.0  # [FIN] export price (Sensitivity sheet basis)

# Homogeneous 100-home fleet: every home 5.5 kWp + 5.0 kWh
# (inp_kWp = 5.5, inp_Batt_kWh = 5; Sensitivity!B6 / B7)
fleet_distribution:
  n_homes: 100
  seed: 42

  pv:
    capacity_kw: 5.5          # inp_kWp = Sensitivity!B6
    azimuth: 180
    tilt: 35

  battery:
    capacity_kwh: 5.0         # inp_Batt_kWh = Sensitivity!B7 (5 kWh basis)

  load:
    annual_consumption_kwh: 3400  # UK TDCV benchmark

# Financial parameters — [FIN] named-cell basis for H6 gate
# Reconciles to Capital_Stack!B6 = £775,000 (5 kWh per home).
# Ref: docs/finance-spreadsheet-reconciliation.md
finance:
  standing_charge_pence_per_day: 60.0       # Typical UK electricity standing charge
  retail_baseline_rate_pence_per_kwh: 23.0  # UK average retail rate (2024)
  self_consumption_override: 0.70           # [FIN] with-battery self-consumption fraction
  pv_cost_per_kwp_gbp: 1000.0              # £1,000/kWp (Workings build-up)
  roof_fit_cost_gbp: 1000.0               # £1,000/home fixed roof-fitting cost
  battery_cost_per_kwh_gbp: 250.0         # £250/kWh battery cost
  grant_gbp: 250000.0                     # [FIN] grant assumption
  equity_fraction: 0.75                   # 75% equity financing
  loan_term_years: 15                     # 15-year loan term
  loan_rate: 0.07                         # 7% annual interest rate
  opex_per_home_per_year_gbp: 131.0       # Annual O&M per home
  asset_life_years: 25                    # 25-year asset lifetime
