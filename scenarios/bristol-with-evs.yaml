# Bristol Phase 1 with Electric Vehicles
#
# 100 homes in Bristol with a realistic mix of:
# - PV sizes: 3-6 kW (20% 3kW, 40% 4kW, 30% 5kW, 10% 6kW)
# - Batteries: 40% none, 40% 5kWh, 20% 10kWh
# - Consumption: Normal distribution around 3400 kWh/year
# - EVs: 30% adoption with mix of charger types and smart charging modes

name: Bristol Phase 1 with EVs

location:
  latitude: 51.45
  longitude: -2.58
  timezone: Europe/London
  altitude: 11.0
  name: Bristol, UK

# Smart Export Guarantee (SEG) configuration
seg:
  rate_pence_per_kwh: 4.1  # Octopus Energy export rate (p/kWh)

fleet_distribution:
  n_homes: 100
  seed: 42
  random_order: default  # Using default for this new scenario

  pv:
    capacity_kw:
      type: shuffled_pool
      values: [3.0, 4.0, 5.0, 6.0]
      counts: [20, 40, 30, 10]
    azimuth: 180
    tilt: 35

  battery:
    capacity_kwh:
      type: shuffled_pool
      values: [null, 5.0, 10.0]
      counts: [40, 40, 20]

  load:
    annual_consumption_kwh:
      type: normal
      mean: 3400
      std: 800
      min: 2000
      max: 6000

  # EV configuration: 30% of homes have EVs
  # Typical UK pattern: arrive home around 18:00, depart around 07:00
  ev:
    charger_type:
      type: shuffled_pool
      values: [null, "7kW", "3.6kW"]  # 70% no EV, 20% fast 7kW, 10% slow 3.6kW
      counts: [70, 20, 10]

    # Arrival hour: most arrive 17:00-19:00 (commuters)
    arrival_hour:
      type: normal
      mean: 18.0
      std: 1.0
      min: 16
      max: 21

    # Departure hour: most depart 06:00-08:00 (morning commute)
    departure_hour:
      type: normal
      mean: 7.0
      std: 0.5
      min: 6
      max: 9

    # Daily charging requirement: typical UK EV doing ~30 miles/day
    # At 3.5 miles/kWh = ~8.6 kWh/day average, but with variation
    required_charge_kwh:
      type: normal
      mean: 10.0
      std: 3.0
      min: 5.0
      max: 25.0

    # Smart charging mode: mix of dumb, solar-aware, and off-peak
    smart_charging_mode: "none"  # Default to dumb charging for baseline
