# Bristol Community Energy Sharing — Demo Scenario
#
# A small heterogeneous fleet demonstrating community energy sharing.
# Uses an explicit `homes:` list (NOT fleet_distribution) to guarantee
# simultaneous midday surplus (exporters) AND deficit (importers), which
# is required for P2P netting to strictly reduce both grid import and export.
#
# Exporters: high PV capacity, low annual load  → generate surplus at midday
# Importers: low PV capacity, high annual load  → draw from grid throughout day
#
# The community: block enables community_battery sharing mode.  The shared
# battery absorbs export surplus and discharges to cover import deficits,
# further reducing grid flows beyond bare P2P netting.

name: Bristol Community Demo

location:
  latitude: 51.45
  longitude: -2.58
  timezone: Europe/London
  altitude: 11.0
  name: Bristol, UK

# ---- EXPORTER homes (high PV, low demand) -----------------------------------
homes:
  - name: "Exporter-1"
    pv:
      capacity_kw: 8.0
      azimuth: 180
      tilt: 35
    load:
      annual_consumption_kwh: 1500.0
      use_stochastic: false

  - name: "Exporter-2"
    pv:
      capacity_kw: 7.0
      azimuth: 180
      tilt: 35
    load:
      annual_consumption_kwh: 1800.0
      use_stochastic: false

  - name: "Exporter-3"
    pv:
      capacity_kw: 6.5
      azimuth: 185
      tilt: 30
    load:
      annual_consumption_kwh: 2000.0
      use_stochastic: false

# ---- IMPORTER homes (low PV, high demand) -----------------------------------
  - name: "Importer-1"
    pv:
      capacity_kw: 0.5
      azimuth: 180
      tilt: 35
    load:
      annual_consumption_kwh: 6000.0
      use_stochastic: false

  - name: "Importer-2"
    pv:
      capacity_kw: 1.0
      azimuth: 180
      tilt: 35
    load:
      annual_consumption_kwh: 5500.0
      use_stochastic: false

  - name: "Importer-3"
    pv:
      capacity_kw: 1.5
      azimuth: 175
      tilt: 35
    load:
      annual_consumption_kwh: 5000.0
      use_stochastic: false

# ---- Community sharing block ------------------------------------------------
# The community: block is OPTIONAL; a plain fleet run ignores it.
# sharing_mode: community_battery — shared battery absorbs midday surplus from
#   exporters and discharges to importers later in the day.
# _parse_battery_config reads capacity_kwh / max_charge_kw / max_discharge_kw.

community:
  sharing_mode: community_battery
  community_battery:
    capacity_kwh: 20.0
    max_charge_kw: 10.0
    max_discharge_kw: 10.0
  billing:
    tariff:
      type: flat_rate
      rate_per_kwh: 0.30
    seg_rate_pence_per_kwh: 4.1
