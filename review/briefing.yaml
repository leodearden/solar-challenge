project: my-solar-challenge   # canonical orchestrator project_id: my_solar_challenge
# NOTE: this repo is a single Python package (src/solar_challenge). It is split
# below into two LOGICAL subprojects — the simulation core and the web dashboard
# — purely to give /review well-scoped focus areas. They share one pyproject.toml.

# Conventions and rules with teeth — violations are bugs. Rationale included so a
# reviewer understands WHY, not just WHAT.
conventions:
  - rule: >
      Energy balance must close at every timestep:
      generation + grid_import = demand + grid_export + (battery_charge - battery_discharge),
      within ~0.001 kWh tolerance.
    why: >
      This is the core correctness invariant of the simulator. The per-timestep flow
      logic enforces it (validate_balance defaults on) and raises on violation. Any
      change to dispatch or energy-flow accounting that breaks closure is a real bug,
      not a rounding quirk.

  - rule: "Grid export must be valued at the export/SEG rate, never at the import tariff rate."
    why: >
      Exported energy earns the Smart Export Guarantee rate (typically flat, ~3-5 p/kWh),
      not the import price. The post-hoc SEG path (seg.py + the seg_tariff parameter on the
      summary calculation) does this correctly. CONFIRMED BUG (user-flagged): when a
      time-of-use tariff is configured, the per-timestep export_revenue series is priced at
      the IMPORT rate, so peak-hour exports get valued at ~25 p/kWh. This overstates revenue
      and corrupts the financial / investor-viability case. /review should flag it.

  - rule: "All config and domain objects are frozen dataclasses, validated in __post_init__, and must stay picklable."
    why: >
      Immutability + picklability are load-bearing, not stylistic: HomeConfig and friends are
      shipped to ProcessPoolExecutor workers for fleet parallelism. A mutable or unpicklable
      config field silently breaks fleet runs. Domain constraints belong in __post_init__,
      enforced at construction time.

  - rule: >
      Fleet simulations must be reproducible from a single seed: per-home seed = fleet_seed + index,
      and stochastic load paths must seed BOTH numpy and the stdlib `random` module.
    why: >
      Reproducibility is a project requirement — planners re-run the canonical Bristol Phase 1
      fleet (seed=42) and expect identical homes. Parallel execution order must never affect
      results. The `bristol_legacy` random-ordering mode exists specifically to preserve the
      original scenario's exact sampling sequence; it looks like a code smell but is intentional
      backward-compatibility — do not "simplify" it away.

  - rule: "mypy --strict must pass; do not widen ignore_missing_imports or add Any-typed config fields."
    why: >
      Strict typing is the safety net for a numerics-heavy codebase. The only sanctioned
      untyped imports are stub-less third-party libs (pvlib/pandas/numpy/yaml/flask/plotly/
      richardsonpy). Eroding this is how silent type drift creeps in.

  - rule: "License is AGPL-3.0-or-later (pyproject is authoritative). New dependencies must be AGPL-compatible."
    why: >
      Copyleft obligations apply to the whole work, so a proprietary or GPL-incompatible
      dependency is a licensing bug. NOTE a real discrepancy worth flagging: the README still
      states 'MIT License', which contradicts pyproject's AGPL-3.0-or-later.

subprojects:
  simulation-core:
    purpose: >
      Physics-based energy-flow simulator for domestic PV + battery systems at 1-minute
      resolution. It models solar generation (pvlib/PVGIS), household demand (incl. EVs and
      heat pumps), battery dispatch, and grid interaction — for a single home or a heterogeneous
      100-home fleet — so the Bristol community-energy project can assess self-sufficiency, grid
      dependency, and SEG export economics. This feeds a real investor-viability case, so the
      numbers matter.

    key_scenarios:
      - "A single home is configured and simulated over a date range, producing a minute-resolution energy time series plus summary stats (self-consumption ratio, grid dependency, SEG revenue)."
      - "A heterogeneous 100-home fleet is generated by sampling per-component distributions (weighted-discrete / normal / uniform / shuffled-pool / proportional), then run in parallel and aggregated."
      - "The same home is run under each dispatch strategy (self-consumption / TOU-optimised / peak-shaving) and the results are compared to quantify grid-import reduction and peak shaving."
      - "A home on a time-of-use tariff (Economy 7/10/custom) is simulated with rate-aware battery dispatch, tracking per-timestep import cost and export revenue."
      - "A home with an EV (immediate / solar-shifted / off-peak smart charging) or a heat pump (temperature-driven COP) adds the corresponding load to base demand."
      - "A parameter sweep (e.g. battery capacity, or battery-to-PV ratio via a proportional distribution) runs many fleet variants in one process pool for sensitivity analysis."
      - "SEG export revenue is computed from total grid export using preset UK supplier rates."

    what_working_means:
      - "Energy balance closes at every timestep (no ValueError from the flow validator)."
      - "validation.py sanity checks pass: non-negative generation capped near system capacity, ~zero night generation, UK annual yield ~700-1100 kWh/kWp, self-consumption within published UK benchmark bands."
      - "Fleet aggregate totals equal the sum of per-home results (energy and SEG revenue)."
      - "The same seed reproduces the identical fleet and per-home stochastic profiles, regardless of parallel execution order."

    key_decisions:
      - decision: "Fleet runs use ProcessPoolExecutor (subprocesses), not threads."
        why: "The work is CPU-bound numpy/pvlib; the GIL would serialise threads. Configs are frozen dataclasses so they pickle cleanly to workers. The weather cache is pre-warmed before the pool starts so workers don't race to write it."
      - decision: "Weather is TMY-based and aligned to the simulation period by month-day-time, discarding the TMY's own year."
        why: "TMY is a synthetic 'typical year', not historical data. Aligning by %m-%d %H:%M lets a sim over real calendar dates use typical conditions. This is intentional — not a date-handling bug."
      - decision: "Hourly PV/temperature data is expanded to 1-minute resolution by forward-fill (repeat each hour's value)."
        why: "Preserves hourly energy totals exactly; deliberately does NOT synthesise sub-hourly variability. A reviewer expecting interpolation/smoothing should know this is the chosen 'simple division' approach."
      - decision: "Two distinct dispatch paths coexist: a Strategy-pattern family (peak/off-peak aware only) and a rate-aware TOU path that uses actual tariff rates."
        why: "They serve different needs — strategy objects know hour-of-day windows; the TOU path knows p/kWh values. The overlap looks redundant but is intentional. (Beware: there are TWO unrelated `TariffPeriod` symbols — one enum in the dispatch module, one dataclass in the tariff module.)"
      - decision: "Distribution types include both probabilistic (weighted-discrete/normal/uniform) and exact-count (shuffled-pool) samplers."
        why: "Shuffled-pool guarantees exactly N homes get a given value (e.g. exactly 40 with no battery), which probabilistic sampling can't promise for small fleets."

    known_gaps:
      - what: "Inter-home power-sharing / community-battery / virtual-net-metering — homes are simulated independently."
        why: "UNINTENDED gap (per user). The README frames it as a 'future phase', but the user does NOT consider it a deliberate deferral — treat as real work-to-do, not an excused omission."
        tracking: null
      - what: "PV panel degradation: degradation factor functions exist and are tested, but are never wired into the live home simulation (no system-age parameter on any config)."
        why: "UNINTENDED gap (per user). Implemented-but-unconnected — long-run yield is currently un-degraded. Surface it."
        tracking: null
      - what: "Battery charging from the grid during cheap tariff periods is not implemented (TOU path only charges from excess PV; code comment calls it a 'future enhancement')."
        why: "UNINTENDED gap (per user). Limits the realism of TOU/arbitrage economics. Surface it."
        tracking: null
      - what: "Stochastic load via richardsonpy falls back silently to an Elexon profile-class shape when the optional `stochastic` extra is absent."
        why: "BY DESIGN — richardsonpy is an optional dependency; the Elexon fallback is the intended default. This one is NOT a bug; do not flag the fallback itself."
        tracking: null

    exclude:
      - "long_running/ — dev harness; its feature_list.json is FROZEN at phase 1 (all 'passes: true') and predates EV/heat-pump/dispatch/tariff/SEG/sweep/web. Do NOT judge completeness from it."
