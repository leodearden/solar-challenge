  web-dashboard:
    purpose: >
      A zero-infrastructure local Flask UI over the simulator: configure single-home or fleet
      runs in a browser, execute them as background jobs with live progress, and explore results
      through interactive Plotly charts — for users who don't want the CLI. Also offers a scenario
      builder, parameter sweeps, and a run history / comparison browser.

    key_scenarios:
      - "A user fills the single-home form, submits it, a background thread runs the sim while an SSE stream drives a live progress bar, then the results page renders the Plotly charts."
      - "A completed run is persisted (SQLite metadata row + on-disk config.json/summary.json/parquet) and reappears in the run-history browser."
      - "A user browses, sorts, filters, renames, deletes, and CSV/YAML-exports past runs, and compares 2-4 runs side by side."
      - "A user builds a scenario in the dual-pane editor with live YAML preview, validates it, and saves / downloads / uploads YAML or loads a built-in preset."
      - "A user configures a parameter sweep and watches N background jobs complete into a metric-vs-parameter chart."

    what_working_means:
      - "The server starts (`solar-challenge web start`), creates the SQLite DB and tables, and serves the dashboard at 127.0.0.1."
      - "A single-home sim submitted via the API runs to completion as a background job, streams progress over SSE, and persists results that load on the results page."
      - "Charts render (server serialises Plotly figures to JSON; the browser draws them, deferring hidden-tab charts)."
      - "The history list loads and paginates; the 43-test Playwright e2e suite passes against a real in-process Flask server."

    key_decisions:
      - decision: "Background jobs use a threading ThreadPoolExecutor with in-memory progress queues + SSE — no Celery/Redis/WebSocket."
        why: "The tool is a local desktop-class app; zero external infrastructure is a stated goal. Consequence (correct, not a bug): it MUST run single-worker, and in-memory job state is lost on restart (stale jobs are recovered at startup)."
      - decision: "SQLite holds metadata/summaries/config; time-series go to on-disk parquet under ~/.solar-challenge/runs/<id>/."
        why: "Keeps SQLite small and fast for list/search; avoids BLOBbing large numeric arrays. Summaries are duplicated into SQLite so the history table renders without reading parquet."
      - decision: "Server-rendered Jinja + Alpine.js for interactivity; plain fetch() for API calls; compiled Tailwind CSS (dist/style.css)."
        why: "Deliberate 'no SPA' stance. NOTE drift from the design doc (see below): HTMX was removed, and Tailwind is compiled rather than CDN play-mode — so dist/style.css must be rebuilt when new utility classes are used, or they render unstyled."
      - decision: "All JSON endpoints are consolidated under /api/; page-route modules keep only thin redirect shims to them."
        why: "A refactor centralised the API surface. A reviewer seeing redirect-only routes in the page modules should not assume logic is missing — it moved to the api module."
      - decision: "Blueprint registration is wrapped in try/except ImportError, and job status / SSE read only in-memory job state (≈1h TTL)."
        why: "Defensive loading of optional features (e.g. the never-built AI assistant). Downsides a reviewer should weigh: a typo in any blueprint silently 404s with no startup warning, and jobs older than the TTL return 404 even though their SQLite row persists."

    known_gaps:
      - what: "AI assistant — entirely absent. No assistant module, no Anthropic dependency; the blueprint import is swallowed and the chat_messages table is never written."
        why: "UNINTENDED gap (per user). The design doc specs it in full (model id, tool use, chat UI); none of it exists. Surface as missing, not deferred."
        tracking: null
      - what: "Fleet-from-distribution web path returns an HTTP 501 stub — the distribution form builds previews but cannot run."
        why: "UNINTENDED gap (per user). The other fleet path (POST an explicit list of home configs) works; this distribution-driven one does not."
        tracking: null
      - what: "Home form lacks heat-pump, tariff, and dispatch-strategy panels that the simulation engine supports (via CLI/YAML); the financial chart uses hardcoded import/export rates."
        why: "UNINTENDED gap (per user). The web UI under-exposes engine capabilities; hardcoded tariff rates also intersect the export-rate bug in the conventions section."
        tracking: null

    exclude:
      - "tests/e2e fixtures and seeded databases — test scaffolding, not product code (the e2e tests themselves ARE in scope)."
      - "~/.solar-challenge/ runtime data dir (DB + parquet) — user runtime state, not in the repo."

