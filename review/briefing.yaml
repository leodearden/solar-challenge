project: my-solar-challenge   # canonical orchestrator project_id: my_solar_challenge
# NOTE: this repo is a single Python package (src/solar_challenge) with one
# pyproject.toml. It is split below into THREE LOGICAL subprojects — the physics
# simulation core, the finance/economics layer, and the web dashboard — purely to
# give /review well-scoped focus areas. The package's frozen-public-API / domain-
# library boundary is cross-cutting and lives in `conventions`, not a subproject.

# Conventions and rules with teeth — violations are bugs. Rationale included so a
# reviewer understands WHY, not just WHAT.
conventions:
  - rule: >
      Energy balance must close at every timestep:
      generation + grid_import = demand + grid_export + (battery_charge - battery_discharge),
      within ~0.001 kWh tolerance — at the per-home level AND at the community level.
    why: >
      This is the core correctness invariant of the simulator. The per-timestep flow
      logic enforces it (validate_energy_balance, on by default) and raises on violation.
      The community-sharing layer extends it as a composition theorem
      (validate_community_balance) over the per-home balances. Any change to dispatch,
      energy-flow accounting, grid-charge source-splitting, or community netting that
      breaks closure is a real bug, not a rounding quirk.

  - rule: "Grid export must be valued at the export/SEG rate, never at the import tariff rate."
    why: >
      Exported energy earns the Smart Export Guarantee rate (typically flat, ~3-5 p/kWh),
      not the import price. This was the original task-#2 fix and the CANONICAL cost-recovery
      path is correct: SEG is threaded via seg_tariff (HomeConfig) and/or
      seg_tariff_pence_per_kwh (ScenarioConfig → calculate_summary). The former LATENT BUG
      here is now FIXED (Task 85, commit 70e9e909, merged 2026-06-30): the export-revenue
      branch in home.py (~home.py:333-349) used to fall back to pricing export at the
      per-timestep IMPORT rate when a TOU tariff_config was set but no SEG was configured,
      silently valuing peak-hour exports at ~25 p/kWh and corrupting the investor case.
      Task 85 removed that branch — export_revenue is now unconditionally 0.0 for every
      timestep when seg_tariff is None, with a UserWarning emitted when tariff_config is set.
      /review should NOT flag the import-rate fallback as an active bug, but the invariant
      itself remains worth enforcing on any future dispatch/pricing change. (Follow-on: Task 85's
      fix surfaced a downstream finance seam — scenario-level seg_tariff_pence_per_kwh is ignored
      by the 25-yr CBS projection, yielding £0 CBS export income — tracked separately, not this rule.)

  - rule: "All config and domain objects are frozen dataclasses, validated in __post_init__, and must stay picklable."
    why: >
      Immutability + picklability are load-bearing, not stylistic: HomeConfig and friends are
      shipped to ProcessPoolExecutor workers for fleet parallelism. A mutable or unpicklable
      config field silently breaks fleet runs. Domain constraints belong in __post_init__,
      enforced at construction time.

  - rule: >
      Fleet simulations must be reproducible from a single seed: per-home seed = fleet_seed + index,
      and stochastic load paths must seed BOTH numpy and the stdlib `random` module.
    why: >
      Reproducibility is a project requirement — planners re-run the canonical Bristol fleet
      and expect identical homes; parallel execution order must never affect results. The
      `bristol_legacy` random-ordering mode exists specifically to preserve the original
      scenario's exact sampling sequence; it looks like a code smell but is intentional
      backward-compatibility — do not "simplify" it away.

  - rule: "mypy --strict must pass; do not widen ignore_missing_imports or add Any-typed config fields."
    why: >
      Strict typing is the safety net for a numerics-heavy codebase that is now a typed library
      (ships py.typed) consumed by a downstream repo under its own mypy --strict. The only
      sanctioned untyped imports are stub-less third-party libs (pvlib/pandas/numpy/yaml/flask/
      plotly/richardsonpy/scipy/anthropic). Eroding this leaks Any into a consumer's type checks.

  - rule: "License is AGPL-3.0-or-later (pyproject is authoritative). New dependencies must be AGPL-compatible."
    why: >
      Copyleft obligations apply to the whole work, so a proprietary or GPL-incompatible
      dependency is a licensing bug. (The old README-says-MIT discrepancy is RESOLVED — README
      now states AGPL. The LICENSE/pyproject/README are uniform.)

  - rule: >
      The public API surface is a FROZEN CONTRACT. `solar_challenge.__all__` (currently 69 names)
      and the signatures of the exported callables are consumed by a separate, pinned repo.
      Adding, removing, renaming, or changing the signature of a public symbol is a BREAKING
      CHANGE that requires a deliberate version/tag bump — never a silent edit.
    why: >
      This package was extracted as a domain library; `solar-challenge-platform` depends on it
      via a git tag and builds against the frozen surface. The surface-lock tests are intentional
      gates, not redundant ceremony: the frozen-__all__ freeze test, the ast-parsed TYPE_CHECKING-
      block ↔ __all__ consistency check, and the isolated external-wheel install test (imports
      every __all__ name in a fresh interpreter). `__init__.py` is deliberately LAZY (PEP-562
      __getattr__ + _SYMBOL_MODULE map) so `import solar_challenge` stays pvlib-free; the
      import-time _SYMBOL_MODULE/__all__ sync check uses raise RuntimeError (not assert) on
      purpose so it survives -O/-OO. The DispatchTariffPeriod alias (dispatch.TariffPeriod enum,
      re-exported renamed to avoid colliding with tariff.TariffPeriod) is intentional. Do not
      "tidy" any of this away.

  - rule: >
      Downstream consumers depend on this library via a git+file dependency pinned to a TAG
      (`solar-challenge @ git+file:///…@solar-challenge-vX.Y.Z`), never an editable path; the
      consumer's pyproject.toml and uv.lock are committed together and a pin bump is a reviewed commit.
    why: >
      An editable/path dependency resolves the live main checkout shared by every worktree, so a
      sim `main` merge would change bytes underneath all in-flight consumer worktrees (flaky
      verify, violates input-stability). A tag pin is content-addressed and immutable — lib
      upgrades become deliberate consumer commits. The tag-cutting discipline (and the
      consumption recipe doc) lives in THIS repo.

  - rule: >
      Board-facing finance/model changes must ship with a human-readable model doc
      (docs/cost-recovery-finance-model.md) AND pass a final adversarial code↔doc verification
      gate — every doc equation traces to code, no unmodelled term, the worked example reproduces
      to the penny. Green unit tests are NOT sufficient acceptance.
    why: >
      These numbers drive a ~£750k share-offer + install-spec decision; "the board can trust the
      numbers" must be made explicit. A doc-vs-code adversarial pass catches model-misimplementation
      that synthetic-input unit tests miss. (User feedback, 2026-06-17.)

  - rule: >
      "Basis-C" own-use accounting (own_use_kwh = total_demand − total_grid_import) is INTENTIONAL
      and arbitrage-immune; it deliberately differs from physics self-consumption
      (min(direct + battery_discharge, demand)) when grid-charging is active. Do not "fix" it to
      match the physics figure.
    why: >
      Grid-charged battery discharge inflates the physics self-consumption figure (B-style) but NOT
      (demand − import), because grid-charged energy is counted in grid_import. Billing CBS own-use
      on Basis C means the CBS — not the householder — bears the battery round-trip loss (absorbed
      into the headline own-use rate). This is the v0.4.0 "arbitrage fix"; a reviewer seeing
      _cbs_own_use_kwh diverge from self-consumption should know it's correct by design.

  # --- Standing review invariants (recorded per /review-briefing policy) ---
  - rule: >
      TODO-tracking invariant: every real TODO/FIXME/HACK marker (and stub idioms like
      NotImplementedError) must be tracked by a NON-TERMINAL task whose brief names resolving it.
    why: >
      Keeps intentional-vs-forgotten distinguishable. CURRENT STATE: the codebase has exactly ONE
      real code TODO (output.py:~549, the `sharing_mode` heuristic). The task tree is fully
      terminal, so that TODO is UNTRACKED/orphaned — /review should treat it as a known_gap (listed
      under simulation-core) until a live task owns it.

  - rule: >
      Deferred-task invariant: no task may sit in `deferred` status without a concrete, actionable
      flip-to-pending condition recorded on it.
    why: >
      `deferred` without a trigger is quarantine rot nobody polls. CURRENT STATE: PASS — the task
      tree has ZERO deferred tasks (84 tasks: 78 done, 6 cancelled).

subprojects:
  simulation-core:
    purpose: >
      Physics-based energy-flow simulator for domestic PV + battery systems at 1-minute
      resolution. Models solar generation (pvlib/PVGIS, with live PV-degradation by system age),
      household demand (base load + EV charging + heat-pump heating), battery dispatch (including
      rate-aware TOU grid-charging / arbitrage), and grid interaction — for a single home or a
      heterogeneous 100-home fleet — plus a post-hoc community-sharing layer (P2P netting /
      shared community battery / virtual-net-metering). It produces the energy aggregates the
      finance layer consumes, so the physics drives a real investor-viability case.

    key_scenarios:
      - "A single home is configured and simulated over a date range, producing a minute-resolution energy time series plus summary stats (self-consumption, grid dependency, costs/revenue)."
      - "A heterogeneous 100-home fleet is generated by sampling per-component distributions (weighted-discrete / normal / uniform / shuffled-pool / proportional), run in parallel, and aggregated; aggregate totals equal the sum of per-home results."
      - "The same home is run under each dispatch strategy (self-consumption / TOU-optimised / peak-shaving) to quantify grid-import reduction and peak shaving."
      - "A home on a TOU tariff with grid-charging enabled charges the battery FROM THE GRID during cheap periods when the round-trip price spread is profitable and the battery is below target SOC (arbitrage), with grid-charge energy and cost accounted separately so the energy balance still closes."
      - "A home with an EV (none / solar-shifted / off-peak smart charging) or a heat pump (ASHP/GSHP, outdoor-temperature-driven COP) adds the corresponding load to base demand before dispatch."
      - "PV generation is degraded for the array's age (system_age_years × degradation_rate_per_year) inside the live simulation, so long-run yield reflects ageing."
      - "A fleet's results are passed to the community layer and netted either instantaneously P2P or through a shared community battery, with VNM £ billing — without re-simulating any home."
      - "A parameter sweep runs many fleet variants in one process pool for sensitivity analysis."

    what_working_means:
      - "Energy balance closes at every timestep, including the community composition (no ValueError from the flow / community validators)."
      - "validation.py sanity checks pass: non-negative generation capped near capacity, ~zero night generation, UK annual yield ~700-1100 kWh/kWp, self-consumption within published UK benchmark bands."
      - "Fleet aggregate totals equal the sum of per-home results."
      - "The same seed reproduces the identical fleet and per-home stochastic profiles regardless of parallel execution order."

    key_decisions:
      - decision: "Fleet runs use ProcessPoolExecutor (subprocesses), not threads."
        why: "Work is CPU-bound numpy/pvlib; the GIL would serialise threads. Frozen dataclass configs pickle cleanly to workers; the weather cache is pre-warmed before the pool starts so workers don't race to write it."
      - decision: "Weather is TMY-based and aligned to the simulation period by month-day-time, discarding the TMY's own year; hourly PV/temperature is expanded to 1-minute by forward-fill (repeat each hour's value)."
        why: "TMY is a synthetic 'typical year', so aligning by %m-%d %H:%M lets a sim over real dates use typical conditions — intentional, not a date bug. Forward-fill preserves hourly energy totals exactly and deliberately does NOT synthesise sub-hourly variability."
      - decision: "Two dispatch paths coexist (a Strategy-pattern family and a rate-aware TOU path), and BOTH now support grid-charging; SelfConsumptionStrategy deliberately accepts-but-ignores the grid-charge context."
        why: "A home only grid-charges if it uses a tou_optimized or peak_shaving strategy with a tariff AND a GridChargeConfig — self-consumption homes never grid-charge even if GridChargeConfig is set. There are also TWO unrelated TariffPeriod symbols (dispatch.py enum vs tariff.py dataclass). Both are intentional; don't unify them."
      - decision: "community.py is a POST-HOC aggregation layer: it consumes FleetResults' public aggregate API and does NOT re-simulate homes or feed back into per-home dispatch; fleet.py's public API is left unchanged."
        why: "Sharing is a value-allocation/aggregation layer over independently-simulated homes (matches the Energy-Local legal model). A reviewer expecting community results to influence home dispatch should know it's intentionally downstream. NOTE: the community battery currently hardcodes SelfConsumptionStrategy — it cannot yet dispatch on TOU/peak-shaving."
      - decision: "PV degradation lives on PVConfig (system_age_years, degradation_rate_per_year), not HomeConfig; applied linearly inside simulate_pv_output."
        why: "Degradation is a PV-array property and simulate_pv_output already takes PVConfig → zero signature churn. Model is linear factor = max(0, 1 - age*rate); no first-year Staebler-Wronski / exponential term, by choice."

    known_gaps:
      - what: "output.py's CommunityMetrics.sharing_mode is a HEURISTIC ('community_battery' if the battery was active, else 'p2p'); a TODO asks to read a real CommunityResults.sharing_mode field once it exists. That field has not been added, and the TODO is untracked (the task tree is terminal)."
        why: "Real work-to-do, not by design. Surface it AND it should be filed as a live task (TODO-tracking invariant)."
        tracking: null

    exclude:
      - "long_running/ — dev harness; its feature_list.json is FROZEN at phase 1 (all 'passes: true') and predates EV/heat-pump/dispatch/tariff/SEG/sweep/finance/community/web. Do NOT judge completeness from it."
      - "scenarios/, results/, data/, logs/, .cache/, build/ — input fixtures and runtime/build output, not application logic."

  finance-economics:
    purpose: >
      The board-facing economic decision layer for the Bristol Community Benefit Society (CBS)
      cost-recovery business model. The CBS owns the PV+batteries (householders take no debt) and
      bills householders an "own-use rate" (~15 p/kWh) for self-consumed CBS-owned solar, below
      ~23 p grid retail — that gap is the householder's saving. This layer models householder
      bills under that scheme, solves the minimum own-use rate that clears a board-set CBS surplus
      floor, projects 25-year CBS economics with battery ageing, values battery flexibility
      (time-shift + grid-services), and ranks discrete install configs by householder outlay.
      These numbers drive a ~£750k share-offer and the install spec, so correctness is paramount.

    key_scenarios:
      - "bill()/householder_bill(): given a home's energy + tariff, compute the CBS-model outlay (grid import + standing charge + own-use payment, VAT'd; NO SEG credit to the householder — the CBS owns the export MPAN) and the saving vs a no-solar baseline."
      - "solve_cost_recovery_rate(): find the own-use rate (p/kWh) at which CBS net surplus hits the board's retained-cash floor (~£27/home/yr), exploiting the affine rate↔surplus relationship; flag infeasible_above_retail when no rate below retail clears the floor."
      - "project_multi_year(): 25-year CBS revenue/cost projection via PCHIP adaptive age-march (seed ages, adaptive bisection) with combined calendar+cycle battery SOH fade."
      - "Battery flexibility valued two ways behind FinanceConfig.grid_services_model: a flat per-kW-of-battery-power income, OR a structured 'capacity-at-events' model (winter weekday-evening windows; availability + utilisation pricing; aggregator share)."
      - "optimize: enumerate a discrete PV×battery×inverter install menu (homogeneous fleet per config), run the cost-recovery solve per config, rank by representative householder outlay with the CBS surplus floor as a HARD Pareto constraint, plus a one-at-a-time sensitivity panel."
      - "The `finance` and `optimize` CLIs render board-readable reports (and a flexibility band report)."

    what_working_means:
      - "Bill identities reconcile: the period-native bill() core is the single source of truth and householder_bill() is a thin annual wrapper over it (no second arithmetic path)."
      - "The cost-recovery solve reaches the surplus floor (binding='floor') for feasible configs and correctly flags rate_clamped_zero / infeasible_above_retail otherwise."
      - "The calibration scenario reproduces the [FIN]/.xlsm spreadsheet figures under identical inputs (method-agreement assertion, NOT a hardcoded headline £)."
      - "The rendered finance/ranking reports match docs/cost-recovery-finance-model.md to the penny (the adversarial doc↔code gate)."

    key_decisions:
      - decision: "The objective is 'minimise householder total outlay (grid import + own-use payment) SUBJECT TO CBS surplus ≥ a board floor', solving for the own-use rate — NOT 'minimise the bill'."
        why: "Minimising a free-retail-rate bill biases toward the largest install (it ignores the capex feedback). The cost-recovery objective couples capex → own-use rate → outlay, so bigger installs are penalised correctly. A reviewer seeing optimize.py rank by representative_outlay_gbp with surplus pinned at the floor should know THIS is the intended objective (a deliberate 2026-06-17 redesign)."
      - decision: "25-year economics via representative-age sim + PCHIP interpolation (forward-march, cumulative-throughput integral) rather than per-timestep dispatch instrumentation; combined calendar+cycle battery SOH."
        why: "Keeps the projection cheap (a handful of fleet sims, not 25) while capturing degradation. Each solve_cost_recovery_rate costs one project_multi_year (3-12 fleet sims) plus one extra age-0 fleet sim for the per-home distribution."
      - decision: "Flat per-kW grid-services and the structured capacity-at-events model COEXIST behind FinanceConfig.grid_services_model; capacity-at-events does NOT replace flat."
        why: "Flat (grid_services_income_per_kw_per_year_gbp × Σ battery max_discharge_kw) is the default, θ-safe (0.0) topper; capacity-at-events is the richer follow-on. flex.py holds reporting-only Low/Central/High bands and does NOT feed the solver — the caller passes a resolved band value into the flat field."
      - decision: "Battery own-use is billed on Basis C (see top-level conventions)."
        why: "Arbitrage-immune CBS revenue; the CBS bears the round-trip loss."

    known_gaps:
      - what: "Capacity-at-events grid-services income is MEMOIZED from the age-0 simulation and reused for all 25 projection years — it does not track battery SOH degradation over the asset life."
        why: "Documented decision, but a real fidelity limitation specifically for the capacity-at-events path (the flat model also doesn't degrade, but it isn't claiming to model real spare capacity). Surface it. tracking: null"
        tracking: null
      - what: "Finance doc/naming hygiene: docs/cost-recovery-finance-model.md cites stale line numbers (acknowledged in-doc), finance.py's module docstring says '11 line items' (BillBreakdown has 10), and BillDistribution.per_home_net_bill_gbp is a deprecated-but-live name that actually holds total_outlay."
        why: "Doc/naming drift, not by design — confusing to a maintainer or new consumer. Surface for cleanup. tracking: null"
        tracking: null
      - what: "solve_cost_recovery_rate's affine reconstruction can be a few pence off true breakeven under severe-loss scenarios (a negative-revenue year clamps the base node)."
        why: "Documented limitation in the function docstring; acceptable for the operating regime but a reviewer should know the solve is approximate at the edges. tracking: null"
        tracking: null

    exclude:
      - "finance/ — the investor-pitch .xlsm spreadsheet is the CALIBRATION source-of-truth artifact, not code (the calibration TEST that reconciles against it IS in scope)."

  web-dashboard:
    purpose: >
      A zero-infrastructure local Flask UI over the simulator AND the finance engine: configure
      single-home or fleet runs in a browser, execute them as background jobs with live progress,
      explore results through interactive Plotly charts, build/validate scenarios, run parameter
      sweeps, browse/compare run history, and chat with an AI assistant that can explain results
      and trigger simulations. For users who don't want the CLI.

    key_scenarios:
      - "A user fills the single-home form (now including heat-pump, tariff/TOU, battery-dispatch, PV-age, and SEG panels), submits it, a background thread runs the sim while an SSE stream drives a live progress bar, then the results page renders Plotly charts — including a financial chart priced from the engine's configured tariff/SEG series (no hardcoded rates)."
      - "A completed run is persisted (SQLite metadata row + on-disk config.json/summary.json/parquet) and reappears in the run-history browser; users sort, filter, rename, delete, CSV/YAML-export, and compare 2-4 runs."
      - "A user configures a fleet-from-distribution run in the browser and it actually executes (generates homes, applies a fleet-wide tariff/dispatch/SEG overlay, runs N background jobs) — the old HTTP-501 stub is gone."
      - "A user builds a scenario in the dual-pane editor with live YAML preview, validates, and saves / downloads / uploads YAML or loads a preset."
      - "A user chats with the AI assistant: a streaming (SSE) Claude-backed conversation with a 6-tool agentic loop — advisory (explain_metric / suggest_config), read (get_run_results / list_recent_runs), and TRIGGER (run_home_simulation / run_fleet_simulation via the JobManager) — persisted to the chat_messages table, degrading gracefully when no API key is present."

    what_working_means:
      - "The server starts (`solar-challenge web start`), creates the SQLite DB + tables, and serves the dashboard at 127.0.0.1."
      - "A single-home sim submitted via the API runs to completion as a background job, streams progress over SSE, and persists results that load on the results page."
      - "Charts render (server serialises Plotly figures to JSON; the browser draws them, deferring hidden-tab charts)."
      - "The assistant either streams a real Claude response (key present) or returns a graceful SSE error frame (key absent); chat history persists and reloads."
      - "The history list loads and paginates; the Playwright e2e suite passes against a real in-process Flask server."

    key_decisions:
      - decision: "Background jobs use a threading ThreadPoolExecutor with in-memory progress queues + SSE — no Celery/Redis/WebSocket."
        why: "The tool is a local desktop-class app; zero external infrastructure is a stated goal. Consequence (correct, not a bug): it MUST run single-worker, and in-memory job state is lost on restart (stale jobs recovered at startup; jobs older than the ~1h TTL return 404 even though their SQLite row persists)."
      - decision: "SQLite holds metadata/summaries/config; time-series go to on-disk parquet under ~/.solar-challenge/runs/<id>/; Jinja + Alpine.js (no SPA, no HTMX); compiled Tailwind (dist/style.css)."
        why: "Keeps SQLite small/fast and avoids BLOBbing arrays; a deliberate 'no SPA' stance. NOTE: compiled Tailwind means dist/style.css must be rebuilt when new utility classes are used, or they render unstyled."
      - decision: "JSON endpoints are consolidated under /api/ (api.py blueprint); the page routes in routes.py are FULL Jinja page renderers."
        why: "A refactor centralised the JSON/API surface. CORRECTION vs the prior briefing: routes.py are NOT thin redirect shims — they render pages. Only the earlier history/scenarios blueprints were folded into api_bp. A reviewer should not assume page-route logic is 'missing/moved'."
      - decision: "The AI assistant uses a DEFERRED `import anthropic` (anthropic is in the `web` extra, not core); model defaults to claude-opus-4-8 (configurable via SOLAR_ASSISTANT_MODEL) with adaptive thinking + prompt caching."
        why: "Deferred import lets the blueprint register cleanly even without the SDK installed (graceful degrade). IMPORTANT: two of the six tools (run_home_simulation / run_fleet_simulation) submit REAL jobs via the JobManager — they are not read-only, so a reviewer auditing the tool surface should weigh that the assistant can trigger work."

    known_gaps:
      - what: "docs/web-ui-design.md residual drift: it still specifies HTMX (code uses Alpine.js) and Tailwind CDN play-mode (code compiles dist/style.css)."
        why: "The doc's AI-assistant section is now BUILT (so that part of the old drift is resolved), but the HTMX/CDN spec is stale. The doc is NOT an authoritative spec of record — flag divergence for human reconciliation, don't treat the doc as ground truth. tracking: null"
        tracking: null

    exclude:
      - "tests/e2e fixtures and seeded databases — test scaffolding, not product code (the e2e tests themselves ARE in scope)."
      - "~/.solar-challenge/ runtime data dir (DB + parquet) — user runtime state, not in the repo."

# ─────────────────────────────────────────────────────────────────────────────
# CROSS-CUTTING: domain-library / packaging boundary (user chose to keep this a
# convention, not a 4th subproject — see the frozen-surface + consumption-contract
# conventions above). The whole package IS the product surface for the downstream
# solar-challenge-platform repo.
#
# NEWCOMER / CONSUMER FOOTGUNS — things that would trip up someone new trying to
# USE this library (user explicitly asked /review to watch for these, 2026-06-29).
# Treat as orientation for review, and flag any that have become outright wrong:
#   - `import solar_challenge` is pvlib-free and fast; accessing ANY pv/weather
#     symbol lazily triggers a heavy pvlib import (PEP-562 by design).
#   - weather.get_tmy_data makes a LIVE outbound HTTPS call to PVGIS at call time —
#     downstream tests must inject a WeatherCache mock.
#   - FlatRateTariff is a CamelCase FACTORY FUNCTION, not a class (a documented gotcha).
#   - Two TariffPeriod symbols: tariff.TariffPeriod (dataclass) vs dispatch.TariffPeriod
#     (enum, re-exported as DispatchTariffPeriod). Easy to import the wrong one.
#   - BillDistribution.per_home_net_bill_gbp holds TOTAL OUTLAY despite the name.
#   - README still frames scope as "Version 0.1 … power-sharing planned for future
#     phases" and documents a pip/venv/requirements.txt/init.sh install flow — both
#     now MISDESCRIBE reality (everything's built; the project uses uv + pyproject +
#     the [dev]/[web] extras). A newcomer reading README gets a wrong mental model.
#   - docs/domain-library-consumption.md's worked example cites a tag
#     `solar-challenge-v0.1.0` that does NOT exist (first real tag is v0.2.0;
#     current is v0.4.0).
#   - tests/unit/test_public_api_surface.py's docstring says "68 public names" but
#     the frozen surface is 69 (stale comment).
#   The README + consumption-doc + stale-comment items were user-confirmed as
#   work-to-flag (2026-06-29), not by-design.
# ─────────────────────────────────────────────────────────────────────────────
